<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waste Log</title>
<style>
:root{
  --bg:#F2F1F6;
  --card:#FFFFFF;
  --ink:#1C1C1E;
  --ink2:#6E6E73;
  --ink3:#AEAEB2;
  --line:#E5E5EA;
  --track:#E9E8ED;
  --brand:#FF6B35;
  --brand-dark:#E0551F;
  --cat-breakfast:#FFB627;
  --cat-buns:#C9923A;
  --cat-chicken:#E63946;
  --cat-sides:#2EC4B6;
  --purple:#6C5CE7;
  --danger:#E63946;
  --success:#34C759;
  --shadow:0 2px 14px rgba(28,28,30,0.07);
  --shadow-lg:0 8px 30px rgba(28,28,30,0.18);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:linear-gradient(135deg,#FFF3E6 0%, #FFFDFB 45%, #E9FAF7 100%);
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
}

.app{max-width:480px;margin:0 auto;min-height:100vh;background:transparent;position:relative;padding-bottom:92px;}

/* ---------- Header ---------- */
.topbar{
  position:sticky;top:0;z-index:30;
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:16px 18px 14px;
  border-bottom:1px solid rgba(0,0,0,0.04);
}
.topbar-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.large-title{font-size:28px;font-weight:800;letter-spacing:-0.02em;margin:0 0 2px;}
.title-sub{font-size:13px;color:var(--ink2);font-weight:500;}
.tracking-line{font-size:12px;color:var(--brand-dark);font-weight:700;margin-top:2px;}
.credit-btn{
  flex-shrink:0;display:inline-flex;align-items:center;gap:5px;text-decoration:none;
  background:var(--card);color:var(--ink);border:1.5px solid var(--line);border-radius:13px;
  padding:8px 12px;font-size:12px;font-weight:700;box-shadow:var(--shadow);white-space:nowrap;
}
.credit-btn:active{transform:scale(0.97);}

/* ---------- Stat / progress chips ---------- */
.stat-row{display:flex;gap:10px;margin-top:14px;}
.stat-chip{
  flex:1;background:var(--card);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);
}
.stat-chip .label{font-size:11px;color:var(--ink2);font-weight:600;}
.stat-chip .value{font-size:19px;font-weight:800;margin-top:2px;}
.stat-chip.cost{background:linear-gradient(135deg,#FF9A5A,var(--brand));}
.stat-chip.entries{background:linear-gradient(135deg,#4FE0CE,var(--cat-sides));}
.stat-chip.cost .label, .stat-chip.cost .value, .stat-chip.entries .label, .stat-chip.entries .value{color:#fff;}
.stat-chip.cost .label, .stat-chip.entries .label{color:rgba(255,255,255,0.85);}

.progress-card{
  background:var(--card);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);margin-top:10px;
}
.daypart-status-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.daypart-status-chip{
  flex:1 1 30%;display:flex;align-items:center;justify-content:center;gap:4px;
  border-radius:10px;padding:8px 4px;font-size:12px;font-weight:700;cursor:pointer;
  border:1.5px solid var(--line);color:var(--ink2);background:var(--card);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.daypart-status-chip.done{
  background:#E7F8EC;
  background:color-mix(in srgb, var(--dp-color, var(--success)) 16%, white);
  border-color:var(--dp-color, var(--success));color:var(--dp-color, var(--success));
}
.daypart-status-chip.selected{box-shadow:0 0 0 2px var(--dp-color, var(--brand));}
.progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.progress-top .ptitle{font-size:12px;font-weight:700;color:var(--ink2);}
.progress-top .pcount{font-size:14px;font-weight:800;}
.progress-bar-track{height:7px;background:var(--track);border-radius:6px;overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--dp-color, var(--success));border-radius:6px;transition:width .3s ease, background .2s ease;}

/* ---------- Main ---------- */
main{padding:16px 16px 24px;}
.error-banner{
  background:var(--danger);color:#fff;padding:11px 14px;border-radius:12px;
  font-size:13px;font-weight:600;margin:0 16px 12px;display:none;
}
.error-banner.show{display:block;}

/* ---------- Category cards ---------- */
.category-card{
  background:var(--card);border-radius:18px;box-shadow:var(--shadow);
  margin-bottom:14px;overflow:hidden;border-top:4px solid var(--cat-color, var(--brand));
}
.category-head{display:flex;align-items:center;gap:10px;padding:14px 16px 8px;}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.category-head h3{font-size:14px;font-weight:700;margin:0;color:var(--ink);}
.item-row{
  display:flex;flex-direction:column;gap:5px;
  padding:13px 16px;border-top:1px solid var(--line);cursor:pointer;
  transition:background .12s;
}
.item-row:active{background:var(--bg);}
.item-row-main{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.item-row .item-name{font-size:15px;font-weight:600;}
.item-row .chevron{color:var(--ink3);font-size:18px;flex-shrink:0;}
.done-badge{
  display:inline-flex;align-items:center;gap:3px;background:#E7F8EC;color:var(--success);
  font-size:12px;font-weight:800;border-radius:20px;padding:3px 9px;align-self:flex-start;
}
.goal-line{
  display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
  padding:2px 0;align-self:flex-start;
}
.goal-line.under{color:var(--ink2);}
.goal-line.over{color:var(--danger);}
.goal-line .goal-icon{font-size:10px;}

/* ---------- Feed / history rows ---------- */
.feed-card{background:var(--card);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;}
.day-divider{font-size:12px;font-weight:700;color:var(--ink2);padding:12px 16px 4px;letter-spacing:0.02em;}
.feed-row{display:flex;align-items:flex-start;gap:11px;padding:12px 16px;border-top:1px solid var(--line);}
.feed-row:first-child{border-top:none;}
.feed-row .cat-dot{margin-top:5px;}
.feed-time{font-size:11px;color:var(--ink2);width:58px;flex-shrink:0;padding-top:2px;font-family:ui-monospace,monospace;}
.feed-body{flex:1;min-width:0;}
.feed-item{font-weight:700;font-size:14px;}
.feed-qty{font-weight:700;color:var(--brand-dark);}
.feed-tags{display:flex;gap:6px;margin-top:3px;}
.feed-tag{font-size:10px;font-weight:600;color:var(--ink2);background:var(--bg);border-radius:6px;padding:2px 7px;}
.feed-note{font-size:12px;color:var(--ink2);margin-top:3px;font-style:italic;}
.feed-del{background:none;border:none;color:var(--ink3);font-size:15px;cursor:pointer;padding:3px 6px;}
.feed-del:active{color:var(--danger);}

.empty-state{text-align:center;padding:40px 20px;color:var(--ink2);}
.empty-state .glyph{font-size:30px;display:block;margin-bottom:8px;}
.loading-text{text-align:center;padding:26px;color:var(--ink3);font-size:13px;}

/* ---------- Dashboard (TV / iPad-mirroring mode) ---------- */
.app.dashboard-mode{max-width:none;}
.app.dashboard-mode .topbar{display:none;}
.app.dashboard-mode .tabbar{max-width:100%;}

.dashboard{
  background:linear-gradient(135deg,#FFF3E6 0%, #FFFDFB 45%, #E9FAF7 100%);
  color:var(--ink);
  min-height:100vh;padding:28px 32px 110px;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
.dash-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:8px;}
.dash-title{font-size:32px;font-weight:800;letter-spacing:-0.01em;}
.dash-clock{font-size:15px;color:var(--ink2);font-weight:600;margin-top:4px;}
.dash-updated{font-size:12px;color:var(--ink2);font-weight:600;align-self:flex-end;}

.dash-hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px;}
.dash-hero-tile{border-radius:18px;padding:22px 24px;box-shadow:var(--shadow);background:var(--card);}
.dash-hero-label{font-size:13px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:0.04em;}
.dash-hero-value{font-size:48px;font-weight:800;margin-top:6px;font-family:ui-monospace,'SF Mono',Menlo,monospace;}
.dash-hero-tile.cost{background:linear-gradient(135deg,#FF9A5A,var(--brand));}
.dash-hero-tile.entries{background:linear-gradient(135deg,#4FE0CE,var(--cat-sides));}
.dash-hero-tile.goal{background:linear-gradient(135deg,#6FE08A,var(--success));}
.dash-hero-tile.goal.flag{background:linear-gradient(135deg,#FF8E86,var(--danger));}
.dash-hero-tile.cost .dash-hero-label, .dash-hero-tile.cost .dash-hero-value,
.dash-hero-tile.entries .dash-hero-label, .dash-hero-tile.entries .dash-hero-value,
.dash-hero-tile.goal .dash-hero-label, .dash-hero-tile.goal .dash-hero-value{color:#fff;}
.dash-hero-tile.cost .dash-hero-label, .dash-hero-tile.entries .dash-hero-label, .dash-hero-tile.goal .dash-hero-label{color:rgba(255,255,255,0.85);}

.dash-section{margin-bottom:28px;}
.dash-section-title{font-size:15px;font-weight:800;color:var(--ink2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;}

.dash-daypart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;}
.dash-daypart-tile{
  background:var(--card);border-radius:16px;padding:18px;border:2px solid var(--line);box-shadow:var(--shadow);
}
.dash-daypart-tile.done{border-color:var(--dp-color, var(--success));background:var(--card);background:linear-gradient(135deg, color-mix(in srgb, var(--dp-color, var(--success)) 18%, white), var(--card));}
.ddp-name{font-size:18px;font-weight:800;}
.ddp-status{font-size:14px;font-weight:700;color:var(--ink2);margin-top:6px;}
.dash-daypart-tile.done .ddp-status{color:var(--dp-color, var(--success));}
.ddp-meta{font-size:12px;color:var(--ink2);margin-top:8px;}

.dash-goal-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;}
.dash-goal-row{background:var(--card);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);}
.dgr-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;gap:10px;}
.dgr-name{font-size:14px;font-weight:700;}
.dgr-val{font-size:13px;font-weight:700;color:var(--ink2);font-family:ui-monospace,monospace;white-space:nowrap;}
.dgr-val.over{color:var(--danger);}
.dgr-track{height:9px;background:var(--track);border-radius:6px;overflow:hidden;}
.dgr-fill{height:100%;background:var(--success);border-radius:6px;}
.dgr-fill.over{background:var(--danger);}

.dash-columns{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;margin-bottom:28px;}
.dash-leaderboard, .dash-category-bars{background:var(--card);border-radius:16px;padding:8px 18px;box-shadow:var(--shadow);}
.dash-lb-row, .dash-cat-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid var(--line);}
.dash-lb-row:first-child, .dash-cat-row:first-child{border-top:none;}
.dash-lb-rank{font-size:13px;font-weight:800;color:var(--ink2);width:16px;flex-shrink:0;}
.dash-lb-name, .dash-cat-name{font-size:14px;font-weight:700;flex-shrink:0;width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dash-lb-track, .dash-cat-track{flex:1;height:9px;background:var(--track);border-radius:6px;overflow:hidden;}
.dash-lb-fill, .dash-cat-fill{height:100%;border-radius:6px;}
.dash-lb-cost, .dash-cat-cost{font-size:13px;font-weight:800;font-family:ui-monospace,monospace;width:62px;text-align:right;flex-shrink:0;}
.dash-empty{padding:18px 0;color:var(--ink2);font-size:13px;text-align:center;}

.dash-activity-card{background:var(--card);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;max-height:420px;overflow-y:auto;}

/* ---------- Bottom tab bar ---------- */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:34;
  background:rgba(255,255,255,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(0,0,0,0.06);
  display:flex;max-width:480px;margin:0 auto;
  padding:8px 6px calc(env(safe-area-inset-bottom,0px) + 6px);
}
.tabbar-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;color:var(--ink3);font-size:11px;font-weight:600;
  padding:6px 0;cursor:pointer;
}
.tabbar-btn .icon{font-size:21px;line-height:1;}
.tabbar-btn.active{color:var(--brand);}

[hidden]{display:none !important;}

/* ---------- Entry sheet ---------- */
.sheet-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:50;
  display:flex;align-items:flex-end;justify-content:center;
}
.entry-sheet{
  background:var(--bg);width:100%;max-width:480px;border-radius:22px 22px 0 0;
  padding:14px 18px 26px;box-shadow:var(--shadow-lg);
  animation:slideUp .22s cubic-bezier(.32,.72,0,1);max-height:88vh;overflow-y:auto;
}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet-handle{width:36px;height:5px;background:var(--ink3);opacity:0.4;border-radius:4px;margin:0 auto 16px;}
.sheet-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.sheet-title{font-size:21px;font-weight:800;margin:0;}
.sheet-sub{font-size:12px;color:var(--ink2);font-weight:600;}
.sheet-done-note{font-size:12px;color:var(--success);font-weight:700;margin-bottom:16px;}

.field-label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--ink2);font-weight:700;margin-bottom:8px;display:block;}

.type-toggle{display:flex;gap:7px;margin-bottom:16px;}
.type-toggle button{
  flex:1;background:var(--card);border:none;border-radius:12px;padding:10px;box-shadow:var(--shadow);
  font-size:13px;font-weight:700;color:var(--ink2);cursor:pointer;
}
.type-toggle button.selected{color:#fff;}

.qty-row{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.qty-btn{
  width:44px;height:44px;border-radius:50%;border:none;background:var(--card);box-shadow:var(--shadow);
  font-size:21px;font-weight:700;color:var(--ink);cursor:pointer;flex-shrink:0;
}
.qty-btn:active{transform:scale(0.92);}
.qty-input{
  flex:1;text-align:center;font-size:23px;font-weight:800;font-family:ui-monospace,monospace;
  border:none;border-radius:14px;padding:9px;background:var(--card);color:var(--ink);box-shadow:var(--shadow);
}
.unit-suffix{font-size:13px;font-weight:700;color:var(--ink2);text-align:center;margin-bottom:18px;}

.weight-mode-toggle{display:flex;gap:7px;margin-bottom:12px;}
.weight-mode-toggle button{
  flex:1;background:var(--card);border:none;border-radius:11px;padding:9px;box-shadow:var(--shadow);
  font-size:12px;font-weight:700;color:var(--ink2);cursor:pointer;
}
.weight-mode-toggle button.selected{background:var(--ink);color:#fff;}
.weight-fields{display:flex;gap:10px;margin-bottom:18px;}
.weight-field{flex:1;}
.weight-field label{font-size:11px;color:var(--ink2);font-weight:700;display:block;margin-bottom:6px;text-align:center;}
.weight-field input{
  width:100%;text-align:center;font-size:21px;font-weight:800;font-family:ui-monospace,monospace;
  border:none;border-radius:14px;padding:11px 4px;background:var(--card);color:var(--ink);box-shadow:var(--shadow);
}

textarea{
  width:100%;border:none;border-radius:12px;padding:12px;font-family:inherit;
  font-size:13px;resize:none;min-height:50px;margin-bottom:18px;background:var(--card);box-shadow:var(--shadow);
}
.sheet-actions{display:flex;gap:10px;}
.btn{flex:1;padding:14px;border-radius:14px;font-weight:700;font-size:15px;cursor:pointer;border:none;}
.btn-cancel{background:var(--card);color:var(--ink);box-shadow:var(--shadow);}
.btn-log{color:#fff;}
.btn-log:disabled{opacity:0.6;}

@media (prefers-reduced-motion: reduce){
  *{animation:none !important;transition:none !important;}
}
</style>
</head>
<body>

<div class="app">

  <div class="topbar">
    <div class="topbar-row">
      <div>
        <div class="large-title">Waste Log</div>
        <div class="title-sub" id="dateStamp"></div>
        <div class="tracking-line" id="trackingLine"></div>
      </div>
      <a class="credit-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSdEi9Rn6w4yqppdGu-goDnrFhU_tvK_Dqezw2ALiT1c8scrNA/viewform?usp=header" target="_blank" rel="noopener noreferrer">📝 Credit Form</a>
    </div>
    <div class="stat-row">
      <div class="stat-chip entries">
        <div class="label">Today</div>
        <div class="value" id="statCount">—</div>
      </div>
      <div class="stat-chip cost">
        <div class="label">Cost Today</div>
        <div class="value" id="statCost">—</div>
      </div>
      <div class="stat-chip">
        <div class="label">Most Wasted</div>
        <div class="value" id="statTop">—</div>
      </div>
    </div>
    <div class="daypart-status-row" id="daypartStatusRow"></div>
    <div class="progress-card">
      <div class="progress-top">
        <span class="ptitle" id="progressTitle">LOGGED THIS DAYPART</span>
        <span class="pcount" id="progressCount">0 / 19</span>
      </div>
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <!-- LOG VIEW -->
  <main id="logView">
    <div id="categoryList"></div>
  </main>

  <!-- DASHBOARD VIEW (designed for mirroring to a TV) -->
  <main id="dashboardView" class="dashboard" hidden>
    <div class="dash-header">
      <div>
        <div class="dash-title">Waste Dashboard</div>
        <div class="dash-clock" id="dashClock"></div>
      </div>
      <div class="dash-updated" id="dashUpdated"></div>
    </div>

    <div class="dash-hero-grid">
      <div class="dash-hero-tile cost">
        <div class="dash-hero-label">Total Cost Today</div>
        <div class="dash-hero-value" id="dashTotalCost">$0.00</div>
      </div>
      <div class="dash-hero-tile entries">
        <div class="dash-hero-label">Entries Logged</div>
        <div class="dash-hero-value" id="dashTotalEntries">0</div>
      </div>
      <div class="dash-hero-tile goal" id="dashOverGoalTile">
        <div class="dash-hero-label">Items Over Goal</div>
        <div class="dash-hero-value" id="dashOverGoal">0</div>
      </div>
    </div>

    <div class="dash-section">
      <div class="dash-section-title">Daypart Status</div>
      <div class="dash-daypart-grid" id="dashDaypartGrid"></div>
    </div>

    <div class="dash-section">
      <div class="dash-section-title">Goal Tracking</div>
      <div class="dash-goal-list" id="dashGoalList"></div>
    </div>

    <div class="dash-columns">
      <div class="dash-section">
        <div class="dash-section-title">Top Wasted Items (Cost)</div>
        <div class="dash-leaderboard" id="dashLeaderboard"></div>
      </div>
      <div class="dash-section">
        <div class="dash-section-title">Cost by Category</div>
        <div class="dash-category-bars" id="dashCategoryBars"></div>
      </div>
    </div>

    <div class="dash-section">
      <div class="dash-section-title">Recent Activity</div>
      <div class="dash-activity-card" id="dashActivity"></div>
    </div>
  </main>

  <div class="tabbar">
    <button class="tabbar-btn active" data-tab="log"><span class="icon">📋</span>Log</button>
    <button class="tabbar-btn" data-tab="dashboard"><span class="icon">📺</span>Dashboard</button>
  </div>

</div>

<!-- ENTRY SHEET -->
<div class="sheet-backdrop" id="sheetBackdrop" hidden>
  <div class="entry-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <span class="cat-dot" id="sheetDot" style="width:14px;height:14px;"></span>
      <div>
        <h2 class="sheet-title" id="sheetItemName">Item</h2>
        <div class="sheet-sub" id="sheetCategoryName">Category</div>
      </div>
    </div>
    <div class="sheet-done-note" id="sheetDoneNote" hidden></div>

    <div class="type-toggle" id="typeToggle" hidden></div>
    <div id="qtySection"></div>

    <span class="field-label">Note (optional)</span>
    <textarea id="noteInput" placeholder="e.g. dropped, overcooked, expired, hold timer"></textarea>

    <div class="sheet-actions">
      <button class="btn btn-cancel" id="sheetCancel">Cancel</button>
      <button class="btn btn-log" id="sheetLog">Log It</button>
    </div>
  </div>
</div>

<script type="module">
// ---------- Firebase / Firestore setup ----------
// This app was originally built on Claude's artifact-only window.storage API.
// Since it's now hosted standalone (GitHub Pages), we back it with Firestore instead,
// but keep the exact same get/set/delete/list shape so none of the app logic below has to change.
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

  getFirestore, doc, getDoc, setDoc, deleteDoc,

// Shared "entry:" keys go to Firestore (synced across every device/team member).
// Everything else (personal unit/weight-mode preferences) stays local to this browser.
window.storage = {
  async get(key, shared){
    if(key.startsWith('entry:')){
      const id = key.slice('entry:'.length);
      const snap = await getDoc(doc(db, ENTRIES_COLLECTION, id));
      if(!snap.exists()) return null;
      return { key, value: JSON.stringify(snap.data()), shared };
    }
    const v = localStorage.getItem(key);
    if(v == null) return null;
    return { key, value: v, shared };
  },
  async set(key, value, shared){
    if(key.startsWith('entry:')){
      const id = key.slice('entry:'.length);
      await setDoc(doc(db, ENTRIES_COLLECTION, id), JSON.parse(value));
      return { key, value, shared };
    }
    localStorage.setItem(key, value);
    return { key, value, shared };
  },
  async delete(key, shared){
    if(key.startsWith('entry:')){
      const id = key.slice('entry:'.length);
      await deleteDoc(doc(db, ENTRIES_COLLECTION, id));
      return { key, deleted: true, shared };
    }
    localStorage.removeItem(key);
    return { key, deleted: true, shared };
  },
  async list(prefix, shared){
    if(prefix && prefix.startsWith('entry:')){
      const idPrefix = prefix.slice('entry:'.length);
      const q = query(
        collection(db, ENTRIES_COLLECTION),
        where(documentId(), '>=', idPrefix),
        where(documentId(), '<', idPrefix + '\uf8ff')
      );
      const snaps = await getDocs(q);
      const keys = snaps.docs.map(d => 'entry:' + d.id);
      return { keys, prefix, shared };
    }
    return { keys: [], prefix, shared };
  }
};

// Price per stored unit (each/tray/lb/qt). Oz prices from the price sheet are converted to $/lb (×16)
// since weight is always stored internally as decimal pounds. Items not listed here have no price yet.
const PRICES = {
  "Biscuits":               { each: 0.25, tray: 0.25 * 20 },
  "Mini's":                 { tray: 3.37 },
  "Sausage":                { each: 0.56 },
  "Scrambled Eggs":         { lb: 0.10 * 16 },
  "Yellow Folds":           { lb: 0.10 * 16 },
  "Egg Whites":             { lb: 0.12 * 16 },
  "Hashbrowns":             { lb: 0.07 * 16 },
  "Mac & Cheese":           { lb: 0.22 * 16 },
  "Nuggets":                { lb: 0.24 * 16 },
  "Strips":                 { lb: 0.12 * 16 },
  "Buns":                   { each: 0.20 },
  "Multigrain Buns":        { each: 0.43 },
  "Specialty Buns":         { each: 0.40 },
  "Filet":                  { lb: 0.23 * 16 },
  "Spicy":                  { lb: 0.21 * 16 },
  "Breakfast Filet":        { lb: 0.22 * 16 },
  "Spicy Breakfast":        { lb: 0.23 * 16 },
  "Milkwash":               { qt: 0.80 },
  "Expired Cooldown Chicken": { lb: 0.23 * 16 },
};
function priceFor(item, unit){
  const p = PRICES[item];
  return (p && p[unit] != null) ? p[unit] : null;
}
function costForEntry(e){
  const p = priceFor(e.item, e.unit);
  return p == null ? null : e.qty * p;
}
function formatCost(c){ return '$' + c.toFixed(2); }
function sumCost(entries){
  let total = 0, priced = 0, unpriced = 0;
  entries.forEach(e => {
    const c = costForEntry(e);
    if(c == null) unpriced++;
    else { total += c; priced++; }
  });
  return { total, priced, unpriced };
}

// How to convert between units logged for the same item, expressed as "1 of fromUnit = X of toUnit".
const UNIT_CONVERSIONS = {
  "Biscuits": { tray: 20 }, // 1 tray = 20 each
};
function convertQty(item, qty, fromUnit, toUnit){
  if(fromUnit === toUnit) return qty;
  const factor = UNIT_CONVERSIONS[item] && UNIT_CONVERSIONS[item][fromUnit];
  if(factor != null) return qty * factor;
  return null; // no known conversion
}
function getTodayTotalForGoalUnit(item, unit){
  let total = 0, allConvertible = true;
  todayEntriesCache.forEach(e => {
    if(e.item !== item) return;
    const converted = convertQty(item, e.qty, e.unit, unit);
    if(converted == null) allConvertible = false;
    else total += converted;
  });
  return { total, allConvertible };
}

// ---------- generic helpers ----------
function pad(n){ return String(n).padStart(2,'0'); }
function dateKeyFromDate(d){ return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`; }
function timeKeyFromDate(d){ return `${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`; }
function randSuffix(){ return Math.random().toString(36).slice(2,6); }
function makeEntryKey(d){ return `entry:${dateKeyFromDate(d)}-${timeKeyFromDate(d)}-${randSuffix()}`; }
function formatTime(iso){
  const d = new Date(iso);
  let h = d.getHours(), m = pad(d.getMinutes());
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12; if(h===0) h=12;
  return `${h}:${m} ${ampm}`;
}
function formatQty(q){ return (q % 1 === 0) ? String(q) : String(Math.round(q*100)/100); }
function formatWeight(totalLbs){
  let lbs = Math.floor(totalLbs);
  let oz = Math.round((totalLbs - lbs) * 16 * 10) / 10;
  if(oz >= 16){ lbs += 1; oz -= 16; }
  if(lbs <= 0 && oz <= 0) return `0 lb`;
  if(lbs <= 0) return `${oz} oz`;
  if(oz <= 0) return `${lbs} lb`;
  return `${lbs} lb ${oz} oz`;
}
function displayQtyUnit(qty, unit){
  if(unit === 'lb') return formatWeight(qty);
  return `${formatQty(qty)} ${unit}`;
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showError(msg){
  const el = document.getElementById('errorBanner');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=> el.classList.remove('show'), 4000);
}
function dateOffset(days){ const d = new Date(); d.setDate(d.getDate() - days); return d; }

// ---------- progress / completion ----------
function getTodayDaypartCounts(){
  const counts = {};
  todayEntriesCache.forEach(e => { if(e.daypart === selectedDaypart){ counts[e.item] = (counts[e.item]||0) + 1; } });
  return counts;
}
function getTodayDaypartItemStats(){
  const stats = {}; // item -> { byUnit: {unit: qty}, cost: number, hasCost: boolean }
  todayEntriesCache.forEach(e => {
    if(e.daypart !== selectedDaypart) return;
    if(!stats[e.item]) stats[e.item] = { byUnit: {}, cost: 0, hasCost: false };
    const s = stats[e.item];
    s.byUnit[e.unit] = (s.byUnit[e.unit] || 0) + (parseFloat(e.qty) || 0);
    const c = costForEntry(e);
    if(c != null){ s.cost += c; s.hasCost = true; }
  });
  return stats;
}
function updateProgress(){
  const counts = getTodayDaypartCounts();
  const done = Object.keys(counts).length;
  const total = getVisibleItemCount(selectedDaypart);
  document.getElementById('progressTitle').textContent = `LOGGED · ${selectedDaypart.toUpperCase()}`;
  document.getElementById('progressCount').textContent = `${done} / ${total}`;
  document.getElementById('progressFill').style.width = `${total ? (done/total*100) : 0}%`;
  document.querySelector('.progress-card').style.setProperty('--dp-color', DAYPART_COLORS[selectedDaypart] || 'var(--success)');
}

// ---------- category list (Log tab) ----------
function renderCategories(){
  const stats = getTodayDaypartItemStats();
  const container = document.getElementById('categoryList');
  container.innerHTML = '';
  getVisibleCategories(selectedDaypart).forEach(cat => {
    const card = document.createElement('div');
    card.className = 'category-card';
    card.style.setProperty('--cat-color', cat.color);
    card.innerHTML = `<div class="category-head"><span class="cat-dot" style="background:${cat.color}"></span><h3>${cat.name}</h3></div>`;
    cat.items.forEach(item => {
      const s = stats[item];
      const row = document.createElement('div');
      row.className = 'item-row';
      let badge = '';
      if(s){
        const qtyStr = Object.entries(s.byUnit).map(([unit,qty]) => displayQtyUnit(qty, unit)).join(', ');
        badge = `<span class="done-badge">✓ ${qtyStr}${s.hasCost ? ' · ' + formatCost(s.cost) : ''}</span>`;
      }
      let goalLine = '';
      const goal = GOALS[item];
      if(goal){
        const { total, allConvertible } = getTodayTotalForGoalUnit(item, goal.unit);
        const over = total > goal.amount;
        const totalStr = displayQtyUnit(total, goal.unit);
        const goalStr = displayQtyUnit(goal.amount, goal.unit);
        goalLine = `<span class="goal-line ${over ? 'over' : 'under'}">
          <span class="goal-icon">${over ? '⚠️' : '🎯'}</span>
          Today: ${totalStr} of ${goalStr} goal${allConvertible ? '' : ' (partial — mixed units)'}
        </span>`;
      }
      row.innerHTML = `
        <div class="item-row-main">
          <span class="item-name">${item}</span>
          <span class="chevron">›</span>
        </div>
        ${badge}
        ${goalLine}`;
      row.addEventListener('click', () => openSheet(item, cat));
      card.appendChild(row);
    });
    container.appendChild(card);
  });
}

// ---------- option / weight-mode memory ----------
async function rememberOption(item, optKey){
  lastOptionCache[item] = optKey;
  try{ await window.storage.set('lastopt:' + item.replace(/[^a-zA-Z0-9]/g,'_'), optKey, false); }catch(e){}
}
async function preloadOptionMemory(){
  const allItems = CATEGORIES.flatMap(c => c.items);
  await Promise.all(allItems.map(async item => {
    try{
      const res = await window.storage.get('lastopt:' + item.replace(/[^a-zA-Z0-9]/g,'_'), false);
      if(res && res.value) lastOptionCache[item] = res.value;
    }catch(e){}
  }));
  try{
    const res = await window.storage.get('weightInputMode', false);
    if(res && res.value) weightMode = res.value;
  }catch(e){}
}
async function setWeightMode(mode){
  weightMode = mode;
  try{ await window.storage.set('weightInputMode', mode, false); }catch(e){}
}

document.getElementById('sheetLog').addEventListener('click', async ()=>{
  const opt = sheetOptions.find(o => o.key === sheetSelectedKey);
  let qty = 0, unit = '';

  if(opt.kind === 'count'){
    qty = parseFloat(document.getElementById('qtyInput').value);
    unit = opt.key;
  } else if(opt.kind === 'volume'){
    qty = parseFloat(document.getElementById('qtyInput').value);
    unit = 'qt';
  } else if(opt.kind === 'weight'){
    unit = 'lb';
    if(weightMode === 'lboz'){
      const lb = parseFloat(document.getElementById('weightLbInput').value) || 0;
      const oz = parseFloat(document.getElementById('weightOzInput').value) || 0;
      qty = lb + (oz/16);
    } else {
      qty = parseFloat(document.getElementById('weightDecInput').value);
    }
  }

  if(!qty || qty <= 0){ showError('Enter a quantity greater than 0.'); return; }

  const note = document.getElementById('noteInput').value.trim();
  const now = new Date();
  const entry = { item: currentItem, category: currentCategory, daypart: selectedDaypart, qty, unit, note, ts: now.toISOString() };
  const key = makeEntryKey(now);
  const btn = document.getElementById('sheetLog');
  btn.disabled = true; btn.textContent = 'Logging…';
  try{
    const res = await window.storage.set(key, JSON.stringify(entry), true);
    if(!res) throw new Error('no result');
    await rememberOption(currentItem, sheetSelectedKey);
    closeSheet();
    loadTodayFeed();
  }catch(e){
    showError('Could not save entry — check connection and try again.');
  }finally{
    btn.disabled = false; btn.textContent = 'Log It';
  }
});

// ---------- storage fetch helpers ----------
async function fetchKeysWithPrefix(prefix){
  try{ const res = await window.storage.list(prefix, true); return (res && res.keys) ? res.keys : []; }
  catch(e){ return []; }
}
async function fetchEntriesForKeys(keys){
  const entries = []; const CHUNK = 12;
  for(let i=0; i<keys.length; i+=CHUNK){
    const chunk = keys.slice(i, i+CHUNK);
    const results = await Promise.all(chunk.map(async k => {
      try{
        const res = await window.storage.get(k, true);
        if(!res) return null;
        const parsed = JSON.parse(res.value);
        parsed.__key = k;
        return parsed;
      }catch(e){ return null; }
    }));
    results.forEach(r => { if(r) entries.push(r); });
  }
  return entries;
}
function catColorFor(catName){
  const cat = CATEGORIES.find(c => c.name === catName);
  return cat ? cat.color : 'var(--ink3)';
}

// ---------- feed rendering ----------
function renderFeedRows(entries, targetEl, opts){
  opts = opts || {};
  if(entries.length === 0){
    targetEl.innerHTML = `<div class="empty-state"><span class="glyph">🍽️</span>No waste logged${opts.emptyHint || ' yet'}.</div>`;
    return;
  }
  entries.sort((a,b)=> b.ts.localeCompare(a.ts));
  let html = ''; let lastDay = null;
  const today = dateKeyFromDate(new Date());
  const yest = dateKeyFromDate(dateOffset(1));

  entries.forEach(en => {
    if(opts.groupByDay){
      const dKey = dateKeyFromDate(new Date(en.ts));
      if(dKey !== lastDay){
        lastDay = dKey;
        let label = (dKey === today) ? 'Today' : (dKey === yest) ? 'Yesterday' : new Date(en.ts).toLocaleDateString(undefined,{month:'short', day:'numeric'});
        html += `<div class="day-divider">${label}</div>`;
      }
    }
    html += `
      <div class="feed-row">
        <span class="cat-dot" style="background:${catColorFor(en.category)}"></span>
        <div class="feed-time">${formatTime(en.ts)}</div>
        <div class="feed-body">
          <div class="feed-item">${escapeHtml(en.item)} — <span class="feed-qty">${displayQtyUnit(en.qty, en.unit)}</span></div>
          <div class="feed-tags">${en.daypart ? `<span class="feed-tag">${escapeHtml(en.daypart)}</span>` : ''}</div>
          ${en.note ? `<div class="feed-note">"${escapeHtml(en.note)}"</div>` : ''}
        </div>
        <button class="feed-del" data-key="${en.__key}" title="Delete entry">✕</button>
      </div>`;
  });
  targetEl.innerHTML = html;
  targetEl.querySelectorAll('.feed-del').forEach(btn => {
    btn.addEventListener('click', async ()=>{
      const key = btn.dataset.key;
      btn.disabled = true;
      try{
        await window.storage.delete(key, true);
        loadTodayFeed();
      }catch(e){ showError('Could not delete entry.'); btn.disabled = false; }
    });
  });
}

async function loadTodayFeed(){
  const todayPrefix = `entry:${dateKeyFromDate(new Date())}`;
  const keys = await fetchKeysWithPrefix(todayPrefix);
  const entries = await fetchEntriesForKeys(keys);
  todayEntriesCache = entries;
  updateStatsStrip(entries);
  refreshAllViews();
}
function updateStatsStrip(entries){
  document.getElementById('statCount').textContent = entries.length;
  const { total, unpriced } = sumCost(entries);
  document.getElementById('statCost').textContent = formatCost(total) + (unpriced > 0 ? '*' : '');
  document.getElementById('statCost').title = unpriced > 0 ? `${unpriced} entr${unpriced===1?'y':'ies'} without a price set` : '';
  if(entries.length === 0){ document.getElementById('statTop').textContent = '—'; return; }
  const counts = {};
  entries.forEach(e => { counts[e.item] = (counts[e.item]||0) + 1; });
  let topItem = '—', topCount = 0;
  Object.entries(counts).forEach(([item,c])=>{ if(c > topCount){ topCount = c; topItem = item; } });
  document.getElementById('statTop').textContent = topItem;
}

// ---------- dashboard (TV / iPad-mirroring view) ----------
function renderDashClock(){
  const el = document.getElementById('dashClock');
  if(!el) return;
  const now = new Date();
  el.textContent = now.toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'}) + '  ·  ' + formatTime(now.toISOString());
}
setInterval(renderDashClock, 1000);
renderDashClock();

function renderDashboard(){
  const grid = document.getElementById('dashDaypartGrid');
  if(!grid) return; // dashboard markup not present
  const entries = todayEntriesCache;

  const { total: totalCost } = sumCost(entries);
  document.getElementById('dashTotalCost').textContent = formatCost(totalCost);
  document.getElementById('dashTotalEntries').textContent = entries.length;

  let overCount = 0;
  Object.entries(GOALS).forEach(([item, goal]) => {
    const { total } = getTodayTotalForGoalUnit(item, goal.unit);
    if(total > goal.amount) overCount++;
  });
  document.getElementById('dashOverGoal').textContent = overCount;
  document.getElementById('dashOverGoalTile').classList.toggle('flag', overCount > 0);

  grid.innerHTML = '';
  DAYPARTS.forEach(dp => {
    const dpEntries = entries.filter(e => e.daypart === dp);
    const { total: dpCost } = sumCost(dpEntries);
    const tile = document.createElement('div');
    tile.className = 'dash-daypart-tile' + (dpEntries.length > 0 ? ' done' : '');
    tile.style.setProperty('--dp-color', DAYPART_COLORS[dp] || 'var(--success)');
    tile.innerHTML = `
      <div class="ddp-name">${dp}</div>
      <div class="ddp-status">${dpEntries.length > 0 ? '✓ Logged' : 'Not logged yet'}</div>
      <div class="ddp-meta">${dpEntries.length} entr${dpEntries.length===1?'y':'ies'} · ${formatCost(dpCost)}</div>`;
    grid.appendChild(tile);
  });

  const goalList = document.getElementById('dashGoalList');
  goalList.innerHTML = Object.entries(GOALS).map(([item, goal]) => {
    const { total, allConvertible } = getTodayTotalForGoalUnit(item, goal.unit);
    const pct = goal.amount > 0 ? Math.min(100, (total/goal.amount)*100) : (total > 0 ? 100 : 0);
    const over = total > goal.amount;
    return `
      <div class="dash-goal-row">
        <div class="dgr-top">
          <span class="dgr-name">${escapeHtml(item)}</span>
          <span class="dgr-val ${over ? 'over' : ''}">${displayQtyUnit(total, goal.unit)} / ${displayQtyUnit(goal.amount, goal.unit)}${allConvertible ? '' : ' *'}</span>
        </div>
        <div class="dgr-track"><div class="dgr-fill ${over ? 'over' : ''}" style="width:${pct}%"></div></div>
      </div>`;
  }).join('');

  const costByItem = {};
  entries.forEach(e => { const c = costForEntry(e); if(c != null) costByItem[e.item] = (costByItem[e.item]||0) + c; });
  const top = Object.entries(costByItem).sort((a,b)=> b[1]-a[1]).slice(0,6);
  const maxCost = top.length ? top[0][1] : 1;
  const lb = document.getElementById('dashLeaderboard');
  lb.innerHTML = top.length === 0 ? `<div class="dash-empty">No waste logged yet today.</div>` : top.map(([item,cost], i) => {
    const cat = ITEM_TO_CAT[item];
    return `
      <div class="dash-lb-row">
        <span class="dash-lb-rank">${i+1}</span>
        <span class="cat-dot" style="background:${cat ? cat.color : 'var(--ink3)'}"></span>
        <span class="dash-lb-name">${escapeHtml(item)}</span>
        <div class="dash-lb-track"><div class="dash-lb-fill" style="width:${(cost/maxCost)*100}%;background:${cat ? cat.color : 'var(--brand)'}"></div></div>
        <span class="dash-lb-cost">${formatCost(cost)}</span>
      </div>`;
  }).join('');

  const costByCat = {};
  entries.forEach(e => { const c = costForEntry(e); if(c != null) costByCat[e.category] = (costByCat[e.category]||0) + c; });
  const catRows = CATEGORIES.map(cat => ({ name: cat.name, color: cat.color, cost: costByCat[cat.name] || 0 }));
  const maxCat = Math.max(1, ...catRows.map(c => c.cost));
  document.getElementById('dashCategoryBars').innerHTML = catRows.map(c => `
    <div class="dash-cat-row">
      <span class="dash-cat-name">${escapeHtml(c.name)}</span>
      <div class="dash-cat-track"><div class="dash-cat-fill" style="width:${(c.cost/maxCat)*100}%;background:${c.color}"></div></div>
      <span class="dash-cat-cost">${formatCost(c.cost)}</span>
    </div>`).join('');

  const activitySorted = entries.slice().sort((a,b)=> b.ts.localeCompare(a.ts)).slice(0, 25);
  renderFeedRows(activitySorted, document.getElementById('dashActivity'), { emptyHint: ' yet today' });

  document.getElementById('dashUpdated').textContent = `Updated ${formatTime(new Date().toISOString())}`;
}

// ---------- boot ----------
(async function init(){
  await preloadOptionMemory();
  await loadTodayFeed();
  setInterval(loadTodayFeed, 30000); // keep the dashboard live for unattended TV display
})();
</script>
